<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConnect - Kết nối Gia sư Sinh viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic">EduConnect</h1>
            <ul class="flex space-x-6">
                <li><a href="#" class="hover:underline">Trang chủ</a></li>
                <li><a href="#tutor-list" class="hover:underline">Tìm gia sư</a></li>
                <li class="bg-orange-500 px-4 py-1 rounded-full font-semibold"><a href="#register">Đăng ký dạy</a></li>
            </ul>
        </div>
    </nav>

    <header class="bg-white py-16 border-b">
        <div class="container mx-auto text-center">
            <h2 class="text-4xl font-extrabold text-gray-800 mb-4">Học tập tốt hơn cùng Sinh viên Giỏi</h2>
            <p class="text-gray-600 text-lg mb-8">Kết nối phụ huynh với đội ngũ gia sư từ các trường đại học top đầu nhanh chóng.</p>
            <a href="#tutor-list" class="bg-blue-600 text-white px-8 py-3 rounded-lg text-lg font-bold hover:bg-blue-700 transition">Xem danh sách Gia sư</a>
        </div>
    </header>

    <section id="tutor-list" class="container mx-auto py-12">
        <h3 class="text-2xl font-bold text-gray-800 mb-8 text-center border-b-2 border-blue-500 w-fit mx-auto pb-2">Gia sư tiêu biểu</h3>
        <div id="tutors-container" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <p class="text-center col-span-full text-gray-500">Đang tải danh sách gia sư...</p>
        </div>
    </section>

    <section id="register" class="bg-blue-50 py-12">
        <div class="container mx-auto max-w-lg bg-white p-8 rounded-xl shadow-md border">
            <h3 class="text-2xl font-bold text-center mb-6">Đăng ký làm Gia sư</h3>
            <form id="tutor-form" class="space-y-4">
                <input type="text" id="name" placeholder="Họ và tên" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                <input type="text" id="school" placeholder="Trường đại học (VD: Bách Khoa)" class="w-full p-3 border rounded-lg" required>
                <input type="text" id="subject" placeholder="Môn dạy (VD: Toán, Lý, Tiếng Anh)" class="w-full p-3 border rounded-lg" required>
                <input type="text" id="price" placeholder="Học phí (VD: 200k/buổi)" class="w-full p-3 border rounded-lg">
                <button type="submit" class="w-full bg-orange-500 text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition">Gửi hồ sơ ngay</button>
            </form>
        </div>
    </section>

    <script>
        const API_URL = 'http://localhost:5000/api/tutors';

        // 1. Hàm lấy danh sách gia sư từ Server
        async function fetchTutors() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const container = document.getElementById('tutors-container');
                
                container.innerHTML = data.map(tutor => `
                    <div class="bg-white p-6 rounded-lg shadow-sm border hover:shadow-md transition">
                        <div class="flex items-center mb-4">
                            <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-xl mr-4 uppercase">
                                ${tutor.name.charAt(0)}
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-800">${tutor.name}</h4>
                                <p class="text-sm text-gray-500">${tutor.school}</p>
                            </div>
                        </div>
                        <p class="text-gray-700"><strong>Môn dạy:</strong> ${tutor.subject}</p>
                        <p class="text-blue-600 font-bold mt-2">${tutor.price || 'Thỏa thuận'}</p>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Lỗi:", err);
            }
        }

        // 2. Hàm gửi dữ liệu đăng ký lên Server
        document.getElementById('tutor-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tutorData = {
                name: document.getElementById('name').value,
                school: document.getElementById('school').value,
                subject: document.getElementById('subject').value,
                price: document.getElementById('price').value
            };

            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(tutorData)
            });

            if (res.ok) {
                alert("Đăng ký thành công!");
                document.getElementById('tutor-form').reset();
                fetchTutors(); // Cập nhật lại danh sách ngay lập tức
            }
        });

        // Chạy hàm lấy dữ liệu khi vừa mở trang
        fetchTutors();
    </script>
</body>
</html>
